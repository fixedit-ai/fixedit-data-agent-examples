# Subscribe to detections from the FixedIT QR Code Decoder ACAP.
#
# The decoder publishes one JSON object per detected code on a Unix domain socket.
# See AGENTS.md in the repo root for the message format.
#
# Environment variables:
# - READER_SOCKET_PATH (optional): defaults to /dev/shm/fixedit.qr_code_decoder.sock

[[inputs.socket_listener]]
  service_address = "unix://${READER_SOCKET_PATH:-/dev/shm/fixedit.qr_code_decoder.sock}"
  socket_mode = "0664"
  read_timeout = "30s"
  read_buffer_size = "300KiB"
  data_format = "json_v2"
  name_override = "barcode_reader_app"

  [inputs.socket_listener.tags]
    input_method = "socket"

  [[inputs.socket_listener.json_v2]]
    timestamp_path = "message.frame_timestamp"
    timestamp_format = "unix"

    [[inputs.socket_listener.json_v2.object]]
      path = "@this"
      tags = ["source"]
      disable_prepend_keys = true
