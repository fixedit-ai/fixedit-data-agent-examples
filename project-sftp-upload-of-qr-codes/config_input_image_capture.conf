# Read combined snapshot JSON from a Unix domain socket (one object per line).
#
# Written by config_output_capture.conf via socat as:
#   {"input_data":<trigger metric>,"image_data":<axis_image_consumer output>}
#
# Environment variables:
# - SNAPSHOT_SOCKET_PATH (optional): defaults to /dev/shm/fixedit.qr_snapshot.sock

[[inputs.socket_listener]]
  service_address = "unix://${SNAPSHOT_SOCKET_PATH:-/dev/shm/fixedit.qr_snapshot.sock}"
  socket_mode = "0660"
  read_timeout = "30s"
  read_buffer_size = "8MiB"
  data_format = "json_v2"
  name_override = "image_capture"

  [[inputs.socket_listener.json_v2]]
    [[inputs.socket_listener.json_v2.field]]
      path = "input_data.fields.decoded_data"
      rename = "decoded_data"
      type = "string"
    [[inputs.socket_listener.json_v2.field]]
      path = "image_data.image_base64"
      rename = "image_base64"
      type = "string"
