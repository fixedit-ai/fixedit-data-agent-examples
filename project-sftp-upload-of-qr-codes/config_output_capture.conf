# Fetch a JPEG snapshot for each QR detection and send to the snapshot socket.
#
# Before capture, sets overlay #D1 (decoded QR value) and #D2 (scanner timestamp).
#
# Writes one JSON line: {"input_data":<trigger>,"image_data":<image json>}
# Parsed by config_input_image_capture.conf (json_v2).
#
# Helper scripts (upload in Files tab, mark executable):
# - set_overlay_text.sh
# - axis_image_consumer.sh

[[outputs.exec]]
  # Only react to "barcode_reader_app" metrics.
  namepass = ["barcode_reader_app"]

  # Execute axis_image_consumer.sh script which returns a JSON with
  # the base64-encoded image data and some metadata. We then create
  # a new wrapping json object so that we can also add the trigger
  # metric to the output. This trigger metric is what includes the
  # decoded_data value, so we need to pass it through together with
  # the image so that the consumer knows which QR code the image
  # belongs to.
  command = [
    "sh",
    "-c",
    '''
# First, read the metric from stdin.
set -e
metric=$(cat)

# Set overlay #D1 / #D2 before JPEG capture.
decoded=$(printf '%s\n' "$metric" | jq -er '.fields.decoded_data')
printf '1 %s\n' "$decoded" | "${HELPER_FILES_DIR}/set_overlay_text.sh"

frame_ts=$(printf '%s\n' "$metric" | jq -er '.fields.frame_timestamp')
frame_ts=$(date -u -d "@${frame_ts}" '+%Y-%m-%dT%H:%M:%SZ')
printf '2 %s\n' "$frame_ts" | "${HELPER_FILES_DIR}/set_overlay_text.sh"

# Then, capture the image and write it to the snapshot socket.
socket="${SNAPSHOT_SOCKET_PATH:-/dev/shm/fixedit.qr_snapshot.sock}"
image_json=$("${HELPER_FILES_DIR}/axis_image_consumer.sh" < /dev/null)
printf '{"input_data":%s,"image_data":%s}\n' "$metric" "$image_json" | socat - "UNIX-CONNECT:$socket"
''',
  ]

  # No batching of inputs (react directly to each metric).
  use_batch_format = false
  metric_batch_size = 1

  # Send the input metric to the script in JSON format.
  data_format = "json"

  # Set a timeout for the script to run.
  timeout = "30s"

  # Limit number of metrics to buffer in memory. This prevents us from
  # falling too far behind, but still make sure that we buffer enough
  # metrics to avoid losing data if there are short outages.
  metric_buffer_limit = 2
