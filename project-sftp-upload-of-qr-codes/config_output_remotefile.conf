# Upload JPEG snapshots to SFTP via outputs.remotefile (rclone SFTP backend).
#
# Credentials from Telegraf secrets (set in Application variables->Telegraf secrets):
#   ftp_host, ftp_user, ftp_pass, ftp_port
#
# Optional environment variables:
#   SFTP_PATH (default: /cameras)

[[secretstores.os]]
  id = "sftp_secrets"
  keyring = "telegraf"

# Sanitize decoded_data for SFTP path segments. Since we are using the
# decoded QR value as a folder name, we need to make sure that we only use
# characters that the SFTP server allows.
[[processors.regex]]
  namepass = ["image_capture"]

  [[processors.regex.fields]]
    key = "decoded_data"
    pattern = "[^A-Za-z0-9._-]"
    replacement = "_"

[[outputs.remotefile]]
  # Only consume "image_capture" metrics.
  namepass = ["image_capture"]

  # SFTP connection string...
  remote = "sftp,host=@{sftp_secrets:ftp_host},user=@{sftp_secrets:ftp_user},pass=@{sftp_secrets:ftp_pass},port=@{sftp_secrets:ftp_port}:${SFTP_PATH:-/cameras}"

  # Remote path: ${SFTP_PATH}/${decoded_data}/${UTC_timestamp}.jpg
  files = ['{{ .Field "decoded_data" }}/{{ .Time.Format "20060102T150405Z" }}.jpg']
  data_format = "template"

  # Decode the base64-encoded image bytes to a raw JPEG file before uploading.
  template = '{{ .Field "image_base64" | b64dec }}'

  # Cache settings, etc...
  cache_write_back = "0s"
  final_write_timeout = "5s"
  cache_max_size = "50MB"
  forget_files_after = "1s"
