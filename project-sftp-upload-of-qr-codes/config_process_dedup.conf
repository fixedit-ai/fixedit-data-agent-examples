# Suppress repeated triggers while the same QR code stays in view.
# Passes barcode_reader_app through unchanged when not suppressed (same metric name).
# Extra env:
# - SNAPSHOT_COOLDOWN_SECONDS (optional): minimum seconds between uploads for the same
#   decoded_data value. Defaults to 30.

[[processors.starlark]]
  namepass = ["barcode_reader_app"]
  source = '''
state = {
    "last_decoded_data": "",
    "last_trigger_time": 0,
}

def apply(metric):
    if metric.name != "barcode_reader_app":
        return

    decoded = metric.fields.get("decoded_data")
    if decoded == None or type(decoded) != "string" or decoded == "":
        return

    # If the same code was detected recently, skip this one.
    if decoded == state["last_decoded_data"]:
        # metric.time is in nanoseconds
        cooldown_ns = int(cooldown_seconds) * 1000000000
        if metric.time - state["last_trigger_time"] < cooldown_ns:
            return

    # Update the last detected code and timestamp.
    state["last_decoded_data"] = decoded
    state["last_trigger_time"] = metric.time

    return metric
'''

  [processors.starlark.constants]
    cooldown_seconds = ${SNAPSHOT_COOLDOWN_SECONDS:-30}
