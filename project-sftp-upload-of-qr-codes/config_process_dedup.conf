# Suppress repeated triggers while the same QR code stays in view.
# Passes barcode_reader_app through unchanged when not suppressed (same metric name).
# Also suppresses stale backlog entries that are too old to be worth capturing.
# Extra env:
# - SNAPSHOT_COOLDOWN_SECONDS (optional): minimum seconds between uploads for the same
#   decoded_data value. Defaults to 30.
# - MAX_DETECTION_AGE_SECONDS (optional): drop detections older than this when processed,
#   so a backed-up socket queue does not trigger one capture per stacked message.
#   Defaults to 5s.

[[processors.starlark]]
  namepass = ["barcode_reader_app"]
  source = '''
load("time.star", "time")
load("logging.star", "log")

state = {
    "last_decoded_data": "",
    "last_trigger_time_s": 0,
}

def ns_to_seconds(time_ns):
    return float(time_ns) / 1000000000.0

def apply(metric):
    if metric.name != "barcode_reader_app":
        return

    ingest_time_s = ns_to_seconds(metric.time)

    decoded = metric.fields.get("decoded_data")
    if decoded == None or type(decoded) != "string" or decoded == "":
        return

    # If the same code was detected recently, skip this one.
    if decoded == state["last_decoded_data"]:
        if ingest_time_s - state["last_trigger_time_s"] < float(cooldown_seconds):
            return

    # Skip stale backlog entries that are no longer worth capturing.
    # This happens mainly at startup when the QR Code Decoder might start
    # detecting codes before this pipeline is up and running, or if the
    # Data Agent is restarted by the user. We dont want to capture a frame
    # that is out-of-date with the QR code detection that triggered it.
    age_s = time.now().unix - ingest_time_s
    if age_s > float(max_detection_age_seconds):
        log.warn("Dropping stale barcode detection: age=" + str(age_s) + "s decoded_data=" + decoded)
        return

    # Update the last detected code and timestamp.
    state["last_decoded_data"] = decoded
    state["last_trigger_time_s"] = ingest_time_s

    return metric
'''

  [processors.starlark.constants]
    cooldown_seconds = ${SNAPSHOT_COOLDOWN_SECONDS:-30}
    max_detection_age_seconds = ${MAX_DETECTION_AGE_SECONDS:-5}
