  <body>
    <div id="app">
      <div class="container">
        <div class="settings-card">
          <h2>App Settings</h2>
          <div
            id="status-message"
            class="status-message status-message--hidden"
            aria-live="polite"
          ></div>
          <div class="form-group">
            <label for="alarm-threshold">Alarm Threshold Duration:</label>
            <div class="time-input-group">
              <input
                id="alarm-threshold"
                type="number"
                min="0"
                aria-label="Threshold value"
              />
              <select id="alarm-threshold-unit" aria-label="Threshold unit">
                <option value="seconds" selected>Seconds</option>
                <option value="minutes">Minutes</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="class-select">Object class filter:</label>
            <select id="class-select">
              <option value="">Any object class</option>
            </select>
          </div>
          <div class="form-group">
            <span id="user-status-label">VAPIX User Status:</span>
            <output
              id="user-status"
              class="user-status"
              aria-labelledby="user-status-label"
              aria-live="polite"
            >
              Not checked
            </output>
          </div>
          <div class="form-group">
            <label
              for="debug-mode"
              class="checkbox-label"
              title="Enable detailed logging for troubleshooting"
            >
              <input
                id="debug-mode"
                type="checkbox"
                aria-describedby="debug-mode-warning"
              />
              Debug Mode
            </label>
            <div
              id="debug-mode-warning"
              class="debug-warning debug-warning--hidden"
            >
              ⚠️ For short-term debugging only. Do not enable for multiple days as it may affect stability or fill up storage.
            </div>
          </div>
          <div class="actions-row">
            <div
              id="loading-indicator"
              class="spinner spinner--hidden"
              aria-hidden="true"
            ></div>
            <button id="save-btn" class="btn-primary">Save</button>
            <button id="refresh-btn" class="btn-secondary">Refresh</button>
          </div>
        </div>
        <div class="canvas-section">
          <div class="import-card">
            <h3>Import Zone</h3>
            <div class="form-group">
              <label for="zone-select">Zone Name:</label>
              <select id="zone-select">
                <option value="">Select a zone...</option>
              </select>
              <div
                id="zone-summary"
                class="zone-summary"
                aria-live="polite"
              ></div>
              <div class="zone-actions">
                <button
                  id="refresh-image-btn"
                  class="btn-secondary"
                  type="button"
                >
                  Refresh Image
                </button>
                <button id="reset-zone-btn" class="btn-secondary" type="button">
                  Reset Zone
                </button>
                <button
                  id="import-zone-btn"
                  class="btn-secondary zone-action--hidden"
                  type="button"
                >
                  Import Zone
                </button>
              </div>
              <div
                id="polygon-validation"
                class="polygon-validation polygon-validation--hidden"
                aria-live="polite"
              >
                Polygon is self-intersecting. Adjust corners before saving.
              </div>
            </div>
          </div>
          <div class="canvas-container">
            <canvas id="zone-canvas"></canvas>
          </div>
        </div>
      </div>
      <div id="version-display" class="version-display"></div>
      <button id="license-trigger" class="license-trigger">
        Show open source license notices
      </button>
      <dialog id="license-modal" class="license-modal" aria-labelledby="license-modal-title">
        <div class="license-modal-content">
          <div class="license-modal-header">
            <h3 id="license-modal-title">Open Source License Notices</h3>
            <button id="license-close" class="close-btn" aria-label="Close license notices">&times;</button>
          </div>
          <pre id="license-text" class="license-text"></pre>
        </div>
      </dialog>
    </div>
  </body>
</html>
